`#robotic-construction` `#timber` `#embodied-perception`

**[keep]** 新穎 8 / 跨域 9 · 2026-07-15 · A. Researcher, B. Builder 等

- **研究問題**:機器人木構組裝如何整合具身知覺回饋,以因應構材誤差?
- **相關理論**:延伸 Gramazio Kohler 的數位建構理論與 Merleau-Ponty 的知覺現象學。
- **研究方法**:力覺回饋 + 視覺伺服的閉環組裝實驗,50 組件足尺驗證。
