## 🤖 AI — 關鍵字「multi-agent systems」

### [FinSAgent: Corpus-Aligned Multi-Agent RAG Framework for Evidence-Grounded SEC Filing Question Answering](https://arxiv.org/abs/2607.18102v1)

`#nlp` `#multi-agent-rag` `#information-retrieval` `#domain-specific-qa`

**[hold]** 新穎 7.0 / 跨域 5.0 · 2026-07-20 · Jijun Chi, Zhenghan Tai, Hanwei Wu 等

- **研究問題**:如何解決在針對高度結構化且冗餘的 SEC 金融文件進行問答時，通用語言模型的先驗知識與特定語料庫的結構、術語及證據標準不匹配（所謂的「先驗-語料庫錯位」）的問題？
- **相關理論**:本文對話現有的檢索增強生成 (RAG) 和多智能體系統文獻，指出它們過度依賴語義相似性進行檢索與排序，忽略了特定領域（如金融合規文件）對於「有效證據」的結構化需求。
- **研究方法**:提出 FinSAgent 框架，核心原則是在模型先驗占主導地位時注入語料庫側的條件。具體機制包括：1) 錨定於 10-K 文件結構的角色專化智能體；2) 基於語料庫摘要視圖的數據庫感知查詢分解；3) 採用學習特徵門控重排序器，以區分證據有效性與語義相似性。
- **研究結論**:FinSAgent 在五個離線金融 QA 基準和一個包含 1000 個用戶評分的在線實驗中，其檢索覆蓋率和答案正確性均優於強大的單智能體和多智能體基線，證明了語料庫對齊策略的有效性。

### [AI Agent Communications in AI-Native 6G Network: Status, Challenges and Opportunities](https://arxiv.org/abs/2607.18138v1)

`#multi-agent-systems` `#6g-network` `#ai-infrastructure` `#communication-protocols`

**[hold]** 新穎 6.0 / 跨域 5.0 · 2026-07-20 · Qiang Duan

- **研究問題**:本文旨在探討新興的 AI 原生 6G 網絡架構與協定規範，是否足以支持基於「服務導向虛擬化架構 (SOVA)」的 AI 代理人通訊需求？
- **相關理論**:文章建立在多代理人系統 (MAS) 與代理式 AI (Agentic AI) 的發展脈絡上，特別是為解決通訊互操作性而提出的 SOVA 框架，並對話 6G 網絡的服務化架構 (SBA) 與網絡切片理論。
- **研究方法**:透過批判性分析，檢視當前與研議中的 6G 網絡架構典範 (如 SBA、網絡虛擬化)，評估其滿足 SOVA 框架對 AI 代理通訊要求的能力，並進行技術標準的差距分析 (gap analysis)。
- **研究結論**:現有 6G 標準在協定層面仍未能完全滿足動態、跨域的多代理人互動需求；文章據此指出了 6G 網絡要真正賦能「AI 代理人互聯網」所需填補的研發差距。

### [On Optimal Event-Triggered Distributed Control for Stochastic Multi-Agent Systems via Reinforcement Learning](https://arxiv.org/abs/2607.17635v1)

`#control-theory` `#multi-agent-systems` `#reinforcement-learning` `#robotics`

**[drop]** 新穎 6.0 / 跨域 2.0 · 2026-07-20 · Ziming Wang, Bingbing Li, Karl H. Johansson 等

- **研究問題**:如何針對具有隨機不確定性的多代理系統 (MAS)，設計一種既能實現最佳化領導者跟隨共識，又能減少控制頻率的分散式控制演算法？
- **相關理論**:本文建立在強化學習 (RL) 的 Actor-Critic 架構之上，特別是針對未知動態的 Actor-Critic-Identifier 變體，並結合了分散式控制和事件觸發控制 (ETC) 理論。
- **研究方法**:採用 Actor-Critic-Identifier 神經網路結構進行最佳化反步 (backstepping) 設計，以識別器網路處理隨機不確定性，並引入混合事件觸發策略與低通濾波器，最後以 Lyapunov 方法證明穩定性並透過機械手臂模擬驗證。
- **研究結論**:提出了一種能有效處理隨機不確定性、保證追蹤誤差有界，並顯著降低控制更新頻率的最佳化分散式控制演算法。
